workflows:
  lint:
    - lint
  fv:
    - fv
  synth:
    - synth
  compile:
    - compile
  test:
    - simulate
  regress:
    - regress

steps:
  prepare:
    depends_on: []
    commands:
      - action: prepare_filelists
  lint:
    depends_on:
      - prepare
    commands:
      - cmd: mkdir -p {lint_out_dir}
      - cmd: cd {lint_out_dir} && {verilator_exe} --lint-only -Wall --top-module {rtl_module} -Wno-BLKSEQ -Wno-UNUSEDSIGNAL -f {generated_rtl_filelist} {lint_waiver}
        log: "{log_file}"
  fv:
    depends_on:
      - prepare
    commands:
      - action: prepare_fv_config
      - cmd: mkdir -p {fv_out_dir}
      - cmd: cd {fv_out_dir} && {sby_exe} -f -d {fv_run_dir} {generated_fv_config}
        log: "{log_file}"
      - action: prepare_fv_summary
  synth:
    depends_on:
      - prepare
    commands:
      - action: prepare_synth_script
      - cmd: mkdir -p {synth_out_dir}
      - cmd: cd {synth_out_dir} && {yosys_exe} -s {generated_synth_script}
        log: "{log_file}"
      - action: prepare_synth_summary
  compile:
    depends_on:
      - prepare
    commands:
      - cmd: mkdir -p {compile_dir}
      - cmd: cd {compile_dir} && {verilator_exe} -Wall --binary --top-module {top_module} {verilator_trace_flag} -Wno-BLKSEQ -Wno-UNUSEDSIGNAL -f {generated_all_filelist}
        log: "{log_file}"
  simulate:
    depends_on:
      - compile
    commands:
      - cmd: mkdir -p {run_dir}
      - cmd: cd {run_dir} && {binary_path} +test={test_name} +tracker_path={tracker_path} +wave_enable={wave_enable} +wave_path={wave_path}
        log: "{log_file}"
  regress:
    depends_on:
      - compile
    commands:
      - cmd: mkdir -p {run_dir}
      - cmd: cd {run_dir} && {binary_path} +test={test_name} +tracker_path={tracker_path} +wave_enable={wave_enable} +wave_path={wave_path}
        log: "{log_file}"
