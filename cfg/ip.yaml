model_root_var: $MODEL_ROOT

output_layout:
  tag_root: workdir/{tag}/
  ip_root: workdir/{tag}/{ip}/
  filelist_dir: workdir/{tag}/{ip}/filelist/
  generated_rtl_filelist: workdir/{tag}/{ip}/filelist/filelist_rtl_{ip}.f
  generated_dv_filelist: workdir/{tag}/{ip}/filelist/filelist_dv_{ip}.f
  generated_all_filelist: workdir/{tag}/{ip}/filelist/filelist_all_{ip}.f
  generated_fv_filelist: workdir/{tag}/{ip}/filelist/filelist_fv_{ip}.f
  qa_out_dir: workdir/{tag}/{ip}/qa/
  qa_report: workdir/{tag}/{ip}/qa/qa_report.txt
  lint_out_dir: workdir/{tag}/{ip}/lint/
  lint_log: workdir/{tag}/{ip}/lint/lint.log
  fv_out_dir: workdir/{tag}/{ip}/fv/
  fv_log: workdir/{tag}/{ip}/fv/fv.log
  fv_run_dir: workdir/{tag}/{ip}/fv/run/
  generated_fv_config: workdir/{tag}/{ip}/fv/{ip}.sby
  fv_summary_yaml: workdir/{tag}/{ip}/fv/{ip}_summary.yaml
  synth_out_dir: workdir/{tag}/{ip}/synth/
  synth_log: workdir/{tag}/{ip}/synth/synth.log
  generated_synth_script: workdir/{tag}/{ip}/synth/synth_{ip}.ys
  synth_json: workdir/{tag}/{ip}/synth/{ip}.json
  synth_netlist: workdir/{tag}/{ip}/synth/{ip}_netlist.v
  synth_stat_json: workdir/{tag}/{ip}/synth/{ip}_stat.json
  synth_area_report: workdir/{tag}/{ip}/synth/{ip}_area.rpt
  synth_check_report: workdir/{tag}/{ip}/synth/{ip}_check.rpt
  synth_summary_yaml: workdir/{tag}/{ip}/synth/{ip}_summary.yaml
  synth_schematic_prefix: workdir/{tag}/{ip}/synth/{ip}_schematic
  synth_schematic_dot: workdir/{tag}/{ip}/synth/{ip}_schematic.dot
  synth_schematic_svg: workdir/{tag}/{ip}/synth/{ip}_schematic.svg
  synth_schematic_png: workdir/{tag}/{ip}/synth/{ip}_schematic.png
  pd_out_dir: workdir/{tag}/{ip}/pd/
  pd_log: workdir/{tag}/{ip}/pd/pd.log
  pd_summary_yaml: workdir/{tag}/{ip}/pd/{ip}_pd_summary.yaml
  pd_floorplan_def: workdir/{tag}/{ip}/pd/floorplan/{ip}_floorplan.def
  pd_io_placement_tcl: workdir/{tag}/{ip}/pd/floorplan/{ip}_io_placement.tcl
  pd_timing_sdc: workdir/{tag}/{ip}/pd/timing/{ip}.sdc
  pd_placed_def: workdir/{tag}/{ip}/pd/place/{ip}_placed.def
  pd_routed_def: workdir/{tag}/{ip}/pd/route/{ip}_routed.def
  pd_final_gds: workdir/{tag}/{ip}/pd/signoff/{ip}.gds
  pd_final_spef: workdir/{tag}/{ip}/pd/signoff/{ip}.spef
  pd_timing_report: workdir/{tag}/{ip}/pd/reports/{ip}_timing.rpt
  pd_drc_report: workdir/{tag}/{ip}/pd/reports/{ip}_drc.rpt
  pd_lvs_report: workdir/{tag}/{ip}/pd/reports/{ip}_lvs.rpt
  pd_layout_svg: workdir/{tag}/{ip}/pd/images/{ip}_layout.svg
  pd_layout_png: workdir/{tag}/{ip}/pd/images/{ip}_layout.png
  compile_dir: workdir/{tag}/{ip}/compile/
  compile_log: workdir/{tag}/{ip}/compile/compile.log
  binary_path: workdir/{tag}/{ip}/compile/obj_dir/{sim_binary}
  test_out_dir: workdir/{tag}/{ip}/tests/{test_name}/
  test_log: workdir/{tag}/{ip}/tests/{test_name}/simulate.log
  test_tracker: workdir/{tag}/{ip}/tests/{test_name}/{ip}_tracker.json
  test_wave: workdir/{tag}/{ip}/tests/{test_name}/{ip}.vcd
  regression_test_out_dir: workdir/{tag}/{ip}/regressions/{regress_name}/{test_name}/
  regression_test_log: workdir/{tag}/{ip}/regressions/{regress_name}/{test_name}/simulate.log
  regression_test_tracker: workdir/{tag}/{ip}/regressions/{regress_name}/{test_name}/{ip}_tracker.json
  regression_test_wave: workdir/{tag}/{ip}/regressions/{regress_name}/{test_name}/{ip}.vcd

ip:
  fifo:
    rtl_filelist: src/rtl/fifo/filelist_rtl_fifo.f
    rtl_module: fifo
    fv_profile: bounded_safety
    fv_top: fifo_prove
    fv_filelist: src/fv/fifo/filelist_fv_fifo.f
    synth_profile: generic_cmos
    synth_constraints:
      clock:
        name: clk
        period_ns: 10.0
      reset:
        name: rst_n
        active: low
      io:
        input_delay_ns: 0.0
        output_delay_ns: 0.0
    pd_profile: openroad_foundation
    pd_constraints:
      floorplan:
        utilization: 0.35
        aspect_ratio: 1.0
        core_margin_um: 10.0
      io_boundary:
        pin_order_policy: grouped_by_interface
        pin_layers:
          - met2
          - met3
      timing:
        clock: clk
        period_ns: 10.0
    dv_filelist: src/dv/fifo/filelist/filelist_dv_fifo.f
    all_filelist: src/dv/fifo/filelist/filelist_all_fifo.f
    rtl_top: src/rtl/fifo/code/fifo.sv
    lint_dir: src/rtl/fifo/lint/
    lint_waiver: src/rtl/fifo/lint/verilator_waiver.vlt
    dv_top: src/dv/fifo/code/tb/
    tb_top_module: fifo_tb
    sim_binary: Vfifo_tb
    regression_dir: src/dv/fifo/regressions/
    test_dir: src/dv/fifo/code/tests/

  counter:
    rtl_filelist: src/rtl/counter/filelist_rtl_counter.f
    rtl_module: counter
    fv_profile: basic_prove
    fv_top: counter_prove
    fv_filelist: src/fv/counter/filelist_fv_counter.f
    synth_profile: generic_cmos
    synth_constraints:
      clock:
        name: clk
        period_ns: 10.0
      reset:
        name: rst_n
        active: low
      io:
        input_delay_ns: 0.0
        output_delay_ns: 0.0
    pd_profile: openroad_foundation
    pd_constraints:
      floorplan:
        utilization: 0.30
        aspect_ratio: 1.0
        core_margin_um: 10.0
      io_boundary:
        pin_order_policy: grouped_by_interface
        pin_layers:
          - met2
          - met3
      timing:
        clock: clk
        period_ns: 10.0
    dv_filelist: src/dv/counter/filelist/filelist_dv_counter.f
    all_filelist: src/dv/counter/filelist/filelist_all_counter.f
    rtl_top: src/rtl/counter/code/counter.sv
    lint_dir: src/rtl/counter/lint/
    lint_waiver: src/rtl/counter/lint/verilator_waiver.vlt
    dv_top: src/dv/counter/code/tb/
    tb_top_module: counter_tb
    sim_binary: Vcounter_tb
    regression_dir: src/dv/counter/regressions/
    test_dir: src/dv/counter/code/tests/
