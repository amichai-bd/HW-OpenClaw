# HW-OpenClaw: Windows + Git Bash only. Intel Questa/ModelSim (vlib, vlog, vsim) + Quartus on PATH
# or full paths. Optional: cfg/env.local.yaml (gitignored) for machine-specific paths.

environment:
  home_dir: "{host_home}"
  model_root: "{repo_root}"
  bin_dir: "{repo_root}/bin"
  bootstrap:
    platform: windows-gitbash
    note: "Install Intel FPGA tools (Quartus Prime) and Questa/ModelSim; add bin directories to PATH or set absolute exe paths below."
  shell:
    exports:
      MODEL_ROOT: "{model_root}"
      PROJECT_BIN: "{bin_dir}"
      WAVEFORM_ENABLED: "1"
      WAVEFORM_FORMAT: "{simulation.waveform.format}"
    path_prepend:
      - "{bin_dir}"
  tools:
    python3:
      exe: python
      version: "Python 3 (Windows)"
      version_cmd: python --version
    vlib:
      exe: vlib
      version: "Questa/ModelSim vlib"
      version_cmd: vlib
    vlog:
      exe: vlog
      version: "Questa/ModelSim vlog"
      version_cmd: vlog
      extra_flags: "+acc"
    vsim:
      exe: vsim
      version: "Questa/ModelSim vsim"
      version_cmd: vsim -version
    quartus_map:
      exe: quartus_map
      version: "Intel Quartus"
      version_cmd: quartus_map --version
    quartus_sh:
      exe: quartus_sh
      version: "Intel Quartus shell"
      version_cmd: quartus_sh --version
    gtkwave:
      exe: gtkwave
      version: "GTKWave (optional, for -debug)"
      version_cmd: gtkwave --version
  simulation:
    waveform:
      enabled: true
      format: vcd
