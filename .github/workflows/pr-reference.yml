name: pr-reference

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-reference:
    runs-on: ubuntu-latest
    steps:
      - name: validate pull request wiki reference
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'PY'
          import os
          import sys

          body = os.environ.get("PR_BODY", "") or ""
          body_lc = body.lower()
          missing = []
          if "according to wiki" not in body_lc:
              missing.append("missing phrase 'according to wiki'")
          if "wiki/" not in body:
              missing.append("missing wiki path reference")
          if missing:
              print("pull request does not satisfy the spec-driven reference rule:", file=sys.stderr)
              for item in missing:
                  print(f"- {item}", file=sys.stderr)
              sys.exit(1)
          PY
