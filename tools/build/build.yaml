targets:
  lint:
    root_steps:
      - lint
    tool_requirements:
      - vlib
      - vlog
    context:
      run_dir: "{lint_out_dir}"
      log_file: "{lint_log}"
    review_files:
      - "{ip_root}"

  compile:
    root_steps:
      - compile
    tool_requirements:
      - vlib
      - vlog
    context:
      run_dir: "{compile_dir}"
      log_file: "{compile_log}"
    review_files:
      - "{ip_root}"

  test:
    root_steps:
      - simulate
    tool_requirements:
      - vlib
      - vlog
      - vsim
    selector:
      kind: test
      param: test_name
      interactive: true
    review_files:
      - "{ip_root}"

  regress:
    root_steps:
      - regress
    tool_requirements:
      - vlib
      - vlog
      - vsim
    selector:
      kind: regression
      param: regress_name
      interactive: true
    context:
      regress_name: "{regress_name}"
    review_files:
      - "{ip_root}"

  fpga:
    root_steps:
      - quartus_compile
    tool_requirements:
      - quartus_sh
    context:
      run_dir: "{quartus_out_dir}"
      log_file: "{quartus_log}"
    review_files:
      - "{quartus_log}"

  qa:
    root_steps:
      - qa
    tool_requirements: []
    context:
      run_dir: "{qa_out_dir}"
      log_file: "{qa_report}"
    review_files:
      - "{qa_report}"
      - "{rtl_filelist}"
      - "{dv_filelist}"

steps:
  prepare:
    display_name: "prepare {ip}"
    depends_on: []
    review_files:
      - "{generated_all_filelist}"
      - "{generated_rtl_filelist}"
    commands:
      - action: prepare_filelists

  lint:
    display_name: "lint {ip}"
    depends_on:
      - prepare
    review_files:
      - "{lint_log}"
    commands:
      - action: lint_sim

  compile:
    display_name: "compile {ip}"
    depends_on:
      - prepare
    review_files:
      - "{compile_log}"
    commands:
      - action: compile_sim

  simulate:
    display_name: "test {test_name} {ip}"
    depends_on:
      - compile
    review_files:
      - "{run_dir}/vlog.log"
      - "{log_file}"
      - "{tracker_path}"
      - "{wave_path}"
    commands:
      - action: test_phase_vlog
      - action: simulate_sim
      - action: review_test_outputs

  quartus_compile:
    display_name: "quartus compile {ip}"
    depends_on:
      - prepare
    review_files:
      - "{quartus_log}"
    commands:
      - action: ensure_dir
        path: "{quartus_out_dir}"
      - action: write_quartus_tcl
      - action: run_quartus_sh_compile

  regress:
    display_name: "regress {regress_name} {ip}"
    depends_on:
      - compile
    review_files:
      - "{ip_root}/regressions/{regress_name}"
    commands:
      - action: run_regression

  qa:
    display_name: "qa {ip}"
    depends_on: []
    review_files:
      - "{qa_report}"
      - "{rtl_filelist}"
      - "{dv_filelist}"
    commands:
      - action: run_qa
