name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup tools
        run: |
          ./setup --ci

      - name: run fifo gate
        run: |
          ./build -ip fifo -qa -lint -fv -synth -regress level_2 -tag "gh_${{ github.run_id }}_fifo"

      - name: upload fifo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-fifo
          path: workdir/gh_${{ github.run_id }}_fifo/
          if-no-files-found: ignore

      - name: run counter gate
        run: |
          ./build -ip counter -qa -lint -fv -synth -regress level_2 -tag "gh_${{ github.run_id }}_counter"

      - name: upload counter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-counter
          path: workdir/gh_${{ github.run_id }}_counter/
          if-no-files-found: ignore
