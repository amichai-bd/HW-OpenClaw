scripts:
  prove:
    path: src/fv/common/scripts/prove.sby

profiles:
  basic_prove:
    description: basic single-task safety proof using smtbmc and z3
    script: prove
    mode: prove
    depth: 12
    expect: pass
    engine: smtbmc
    solver: z3
    multiclock: false
  bounded_safety:
    description: bounded safety check using smtbmc and z3 for stateful IPs
    script: prove
    mode: bmc
    depth: 10
    expect: pass
    engine: smtbmc
    solver: z3
    multiclock: false
