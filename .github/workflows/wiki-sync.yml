name: wiki-sync

on:
  push:
    branches:
      - main
    paths:
      - wiki/**
      - tools/wiki/**
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: publish versioned wiki to GitHub Wiki
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          WIKI_SYNC_TOKEN: ${{ github.token }}
        run: python3 tools/wiki/publish_github_wiki.py
