name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: gate-${{ matrix.ip }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ip: fifo
            regress: level_2
          - ip: counter
            regress: level_2
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install apt tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator yosys boolector z3 python3-click

      - name: install sby
        run: |
          git clone --depth 1 https://github.com/YosysHQ/sby.git /tmp/sby
          make -C /tmp/sby install PREFIX="$HOME/.local"

      - name: show tool versions
        run: |
          python3 --version
          verilator --version
          yosys -V
          "$HOME/.local/bin/sby" --version
          boolector --version
          z3 --version

      - name: run builder gate
        run: |
          . cfg/env.sh
          build -ip "${{ matrix.ip }}" -lint -fv -synth -regress "${{ matrix.regress }}" -tag "gh_${{ github.run_id }}_${{ matrix.ip }}"

      - name: upload workdir artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-${{ matrix.ip }}
          path: workdir/gh_${{ github.run_id }}_${{ matrix.ip }}/
          if-no-files-found: error
