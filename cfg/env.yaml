environment:
  home_dir: "{host_home}"
  model_root: "{repo_root}"
  bin_dir: "{repo_root}/bin"
  bootstrap:
    platform: debian-ubuntu
    apt_packages:
      - bubblewrap
      - build-essential
      - ca-certificates
      - git
      - graphviz
      - gtkwave
      - make
      - python3-click
      - python3-pip
      - python3-yaml
      - verilator
      - yosys
      - boolector
      - z3
    user_installs:
      sby:
        repo: https://github.com/YosysHQ/sby.git
        ref: main
        install_prefix: "{host_home}/.local"
      orfs:
        image: openroad/orfs@sha256:86dfae2d567b8570d71fa49f24ea420a2e79d9645673ba41fd70c5a63510e4aa
        image_digest: sha256:86dfae2d567b8570d71fa49f24ea420a2e79d9645673ba41fd70c5a63510e4aa
        platform: linux/amd64
        install_root: "{host_home}/.local/share/hw-openclaw/orfs/sha256-86dfae2d"
        runner: /usr/bin/bwrap
        crane:
          version: v0.21.7
          exe: "{host_home}/.local/bin/crane"
          archive_url: https://github.com/google/go-containerregistry/releases/download/v0.21.7/go-containerregistry_Linux_x86_64.tar.gz
          archive_sha256: 1a57bc98207fa1c0d04bf760699099e26f8383499bfd55b99c1b919a928a7230
    manual_tools:
      openroad:
        reason: "PD place-and-route is optional Tier 2; provision the pinned ORFS image with ./setup --pd and run it with ./build -pd -pd-exec"
        preferred_path: "{host_home}/.local/share/hw-openclaw/orfs/sha256-86dfae2d/rootfs/OpenROAD-flow-scripts/tools/install/OpenROAD/bin/openroad"
        install_mode: pinned-image-rootfs-bubblewrap
  shell:
    exports:
      MODEL_ROOT: "{model_root}"
      PROJECT_BIN: "{bin_dir}"
      PYTHON3_EXE: "{tools.python3.exe}"
      PYTHON3_VERSION: "{tools.python3.version}"
      VERILATOR_EXE: "{tools.verilator.exe}"
      VERILATOR_VERSION: "{tools.verilator.version}"
      VERILATOR_TRACE_FLAG: "{tools.verilator.trace_flag}"
      GTKWAVE_EXE: "{tools.gtkwave.exe}"
      GTKWAVE_VERSION: "{tools.gtkwave.version}"
      DOT_EXE: "{tools.dot.exe}"
      DOT_VERSION: "{tools.dot.version}"
      YOSYS_EXE: "{tools.yosys.exe}"
      YOSYS_VERSION: "{tools.yosys.version}"
      SBY_EXE: "{tools.sby.exe}"
      SBY_VERSION: "{tools.sby.version}"
      BOOLECTOR_EXE: "{tools.boolector.exe}"
      BOOLECTOR_VERSION: "{tools.boolector.version}"
      Z3_EXE: "{tools.z3.exe}"
      Z3_VERSION: "{tools.z3.version}"
      WAVEFORM_ENABLED: "1"
      WAVEFORM_FORMAT: "{simulation.waveform.format}"
    path_prepend:
      - "{bin_dir}"
  tools:
    python3:
      exe: /usr/bin/python3
      version: "Python 3.12.3"
      version_cmd: "/usr/bin/python3 --version"
    verilator:
      exe: /usr/bin/verilator
      version: "Verilator 5.020 2024-01-01 rev (Debian 5.020-1)"
      version_cmd: "/usr/bin/verilator --version"
      trace_flag: "--trace"
    gtkwave:
      exe: /usr/bin/gtkwave
      version: "GTKWave Analyzer v3.3.116"
      version_cmd: "/usr/bin/gtkwave --version"
    dot:
      exe: /usr/bin/dot
      version: "dot - graphviz version 2.43.0"
      version_cmd: "/usr/bin/dot -V"
    yosys:
      exe: /usr/bin/yosys
      version: "Yosys 0.33 (git sha1 2584903a060)"
      version_cmd: "/usr/bin/yosys -V"
    sby:
      exe: "{home_dir}/.local/bin/sby"
      version: "SBY v0.63-11-g6424d15"
      version_cmd: "{home_dir}/.local/bin/sby --version"
    boolector:
      exe: /usr/bin/boolector
      version: "1.5.118"
      version_cmd: "/usr/bin/boolector --version"
    z3:
      exe: /usr/bin/z3
      version: "Z3 version 4.8.12 - 64 bit"
      version_cmd: "/usr/bin/z3 --version"
  simulation:
    waveform:
      enabled: true
      format: vcd
