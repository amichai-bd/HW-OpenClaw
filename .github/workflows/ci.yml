name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator yosys boolector z3 python3-click
          git clone --depth 1 https://github.com/YosysHQ/sby.git /tmp/sby
          make -C /tmp/sby install PREFIX="$HOME/.local"
          python3 --version
          verilator --version
          yosys -V
          "$HOME/.local/bin/sby" --version
          boolector --version
          z3 --version

      - name: run fifo gate
        run: |
          . cfg/env.sh
          build -ip fifo -lint -fv -synth -regress level_2 -tag "gh_${{ github.run_id }}_fifo"

      - name: upload fifo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-fifo
          path: workdir/gh_${{ github.run_id }}_fifo/
          if-no-files-found: error

      - name: run counter gate
        run: |
          . cfg/env.sh
          build -ip counter -lint -fv -synth -regress level_2 -tag "gh_${{ github.run_id }}_counter"

      - name: upload counter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-counter
          path: workdir/gh_${{ github.run_id }}_counter/
          if-no-files-found: error
